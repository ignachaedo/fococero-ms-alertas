apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-alertas
  namespace: fococero
  labels:
    app: ms-alertas
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ms-alertas
  template:
    metadata:
      labels:
        app: ms-alertas
        tier: backend
    spec:
      containers:
        - name: ms-alertas
          image: 711147367899.dkr.ecr.us-east-1.amazonaws.com/fococero-ms-alertas:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
              protocol: TCP
          envFrom:
            - secretRef:
                name: fococero-env
          env:
            - name: PORT
              value: "3003"
            - name: DB_NAME
              value: "alertas_db"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      terminationGracePeriodSeconds: 30
