apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-alertas
  namespace: fococero
  labels:
    app: ms-alertas
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ms-alertas
  template:
    metadata:
      labels:
        app: ms-alertas
        tier: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ms-alertas
          image: 711147367899.dkr.ecr.us-east-1.amazonaws.com/fococero-ms-alertas:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
              protocol: TCP
          env:
            - name: PORT
              value: '3003'
            - name: AUTH_SERVICE_URL
              value: 'http://ms-auth:3001'
            - name: NODE_ENV
              value: 'production'
            # Variables de BD
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: ms-alertas-secrets, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: ms-alertas-secrets, key: DB_PASSWORD } }
            - name: DB_HOST
              value: 'db-fococero'
            - name: DB_PORT
              value: '5432'
            - name: DB_NAME
              value: 'alertas_db'
            # Firebase
            - name: FIREBASE_PROJECT_ID
              valueFrom: { secretKeyRef: { name: firebase-secret, key: FIREBASE_PROJECT_ID } }
            - name: FIREBASE_CLIENT_EMAIL
              valueFrom: { secretKeyRef: { name: firebase-secret, key: FIREBASE_CLIENT_EMAIL } }
            - name: FIREBASE_PRIVATE_KEY
              valueFrom: { secretKeyRef: { name: firebase-secret, key: FIREBASE_PRIVATE_KEY } }
            # Seguridad y Tokens
            - name: INTERNAL_SECRET_TOKEN
              valueFrom: { secretKeyRef: { name: ms-alertas-secrets, key: INTERNAL_SECRET_TOKEN } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: ms-alertas-secrets, key: JWT_SECRET } }
            # Eureka Desactivado (para evitar ECONNREFUSED)
            - name: EUREKA_CLIENT_REGISTERWITHEUREKA
              value: 'false'
            - name: EUREKA_CLIENT_FETCHREGISTRY
              value: 'false'
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '256Mi'
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2